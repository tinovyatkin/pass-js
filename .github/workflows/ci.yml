name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [24.x, 26.x]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: node --test --experimental-test-coverage --test-reporter=spec "__tests__/*.ts"

  coverage:
    # Coverage is host/version-independent for a pure-JS library; run once on
    # the canonical shard to avoid uploading 6 copies per PR.
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write # required for Codecov OIDC tokenless upload
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run tests with lcov coverage
        run: |
          mkdir -p coverage
          # --enable-source-maps makes the lcov reporter emit src/*.ts
          # paths (as declared in the .js.map files tsgo generates),
          # not the built dist/*.js. Codecov then annotates the actual
          # source in PR comments without needing path rewrites.
          node --enable-source-maps --test \
            --experimental-test-coverage \
            --test-coverage-exclude="__tests__/**" \
            --test-reporter=spec \
            --test-reporter-destination=stdout \
            --test-reporter=lcov \
            --test-reporter-destination=coverage/lcov.info \
            "__tests__/*.ts"
      - uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: coverage/lcov.info
          fail_ci_if_error: true

  bundle-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: esbuild single-file bundle (Lambda-style)
        run: |
          npx esbuild dist/index.js \
            --bundle \
            --platform=node \
            --format=esm \
            --target=node24 \
            --outfile=/tmp/bundle.mjs
          # Load the bundle from outside the repo so we prove it doesn't
          # depend on node_modules being present at runtime.
          node --input-type=module -e \
            "import('file:///tmp/bundle.mjs').then(m => { if (!m.Pass || !m.Template) { console.error('missing exports'); process.exit(1); } })"
