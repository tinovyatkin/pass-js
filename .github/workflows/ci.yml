name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [24.x, 26.x]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: node --test --experimental-test-coverage --test-reporter=spec '__tests__/*.ts'

  bundle-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: esbuild single-file bundle (Lambda-style)
        run: |
          # --banner injects a createRequire shim so bundled CJS modules
          # (e.g. @noble/hashes → node:crypto) can still resolve node
          # builtins when the output format is ESM.
          npx esbuild dist/index.js \
            --bundle \
            --platform=node \
            --format=esm \
            --target=node24 \
            --banner:js="import { createRequire } from 'node:module'; const require = createRequire(import.meta.url);" \
            --outfile=/tmp/bundle.mjs
          # Load the bundle from outside the repo so we prove it doesn't
          # depend on node_modules being present at runtime.
          node --input-type=module -e \
            "import('file:///tmp/bundle.mjs').then(m => { if (!m.Pass || !m.Template) { console.error('missing exports'); process.exit(1); } })"
      - name: ncc single-file bundle
        run: |
          npx @vercel/ncc build dist/index.js -o /tmp/ncc-out
          node -e "const m = require('/tmp/ncc-out/index.js'); if (!m.Pass || !m.Template) { console.error('missing exports'); process.exit(1); }"
