name: Code metrics

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  mehen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ophidiarium/mehen@v0
        with:
          paths: src
