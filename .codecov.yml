coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 5%

# Tests build src/*.ts → dist/*.js and measure coverage against the emitted
# JS. Rewrite those paths back to src/*.ts so Codecov's file view, PR
# annotations, and "Files changed" diff correlate with the actual sources.
fixes:
  - "dist/lib/::src/lib/"
  - "dist/::src/"
  - "*.js::*.ts"
  - "*.cjs::*.ts"

ignore:
  - __tests__
  - coverage
  - bin
  - keys
  - images

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
